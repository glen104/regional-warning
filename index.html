<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NWS Regional Warning Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --panel:#0f1318; --border:#1e2530; --border-hi:#2a3545;
  --text:#c8d4e0; --text-dim:#5a6a7a; --text-hi:#e8f0f8;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
  --jan:#1a6fb5; --jan-hi:#2490e8;
  --bmx:#b56b1a; --bmx-hi:#e88c24;
  --mob:#1a8a3a; --mob-hi:#28cc58;
  --hun:#7a1ab5; --hun-hi:#aa44e8;
  --tor:#cc2200; --tor-hi:#ff3311; --tor-glow:rgba(204,34,0,.2);
  --svr:#cc8800; --svr-hi:#ffaa00; --svr-glow:rgba(204,136,0,.15);
  --ff:#006699;  --ff-hi:#0099cc;  --ff-glow:rgba(0,102,153,.15);
  --fa:#004466;  --fa-hi:#0077aa;
  --iem:#2a6e2a; --iem-hi:#4aaa4a;
  --api:#555;    --api-hi:#999;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}

/* ── HEADER ── */
#header{
  background:linear-gradient(135deg,#0d1520,#0a0c0f);
  border-bottom:1px solid var(--border-hi);
  padding:10px 16px;
  padding-top:max(10px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
#header h1{font-weight:900;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-hi);white-space:nowrap}
#header h1 .jan{color:var(--jan-hi)}
#header h1 .bmx{color:var(--bmx-hi)}
#header h1 .mob{color:var(--mob-hi)}
#header h1 .hun{color:var(--hun-hi)}
#header h1 .div{color:var(--text-dim);margin:0 5px}
#status-bar{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.62rem;color:var(--text-dim);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:#2a6;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#refresh-btn{background:var(--border-hi);border:1px solid var(--border);color:var(--text-dim);padding:5px 10px;border-radius:3px;font-family:var(--mono);font-size:.62rem;cursor:pointer;letter-spacing:1px;transition:all .15s}
#refresh-btn:active{background:var(--border);color:var(--text)}

/* ── MOBILE OFFICE TABS ── */
#office-tabs{
  display:flex;border-bottom:2px solid var(--border-hi);
  background:var(--panel);position:sticky;
  top:41px;z-index:190;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
#office-tabs::-webkit-scrollbar{display:none}
.office-tab{
  flex:1;min-width:70px;padding:9px 10px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;user-select:none;
}
.office-tab .tab-id{font-weight:900;font-size:1rem;letter-spacing:3px;color:var(--text-dim)}
.office-tab .tab-count{font-family:var(--mono);font-size:.55rem;color:var(--text-dim)}
.office-tab.jan.active{border-bottom-color:var(--jan);background:rgba(26,111,181,.1)}
.office-tab.jan.active .tab-id{color:var(--jan-hi)}
.office-tab.bmx.active{border-bottom-color:var(--bmx);background:rgba(181,107,26,.1)}
.office-tab.bmx.active .tab-id{color:var(--bmx-hi)}
.office-tab.mob.active{border-bottom-color:var(--mob);background:rgba(26,138,58,.1)}
.office-tab.mob.active .tab-id{color:var(--mob-hi)}
.office-tab.hun.active{border-bottom-color:var(--hun);background:rgba(122,26,181,.1)}
.office-tab.hun.active .tab-id{color:var(--hun-hi)}

/* ── LAYOUT ── */
#offices{display:block;height:calc(100vh - 92px);overflow:hidden}
.office-panel{display:none;flex-direction:column;height:100%;overflow:hidden}
.office-panel.active{display:flex}

/* ── DESKTOP ── */
@media(min-width:900px){
  #office-tabs{display:none}
  #offices{display:grid;grid-template-columns:repeat(4,1fr);gap:0;height:calc(100vh - 41px)}
  .office-panel{display:flex!important;border-right:1px solid var(--border-hi)}
  .office-panel:last-child{border-right:none}
  .office-head{display:flex!important}
  .src-toggle{display:none!important}
  .source-grid{display:grid!important;grid-template-columns:1fr 1fr}
  .source-col{display:block!important}
  .warn-list{flex:1;overflow-y:auto}
}

/* ── OFFICE HEAD (desktop) ── */
.office-head{display:none;padding:9px 14px;border-bottom:2px solid;align-items:baseline;gap:8px;flex-shrink:0}
.office-panel.jan .office-head{background:rgba(26,111,181,.12);border-color:var(--jan)}
.office-panel.bmx .office-head{background:rgba(181,107,26,.12);border-color:var(--bmx)}
.office-panel.mob .office-head{background:rgba(26,138,58,.12);border-color:var(--mob)}
.office-panel.hun .office-head{background:rgba(122,26,181,.12);border-color:var(--hun)}
.office-id-lbl{font-weight:900;font-size:1.1rem;letter-spacing:4px}
.jan .office-id-lbl{color:var(--jan-hi)}
.bmx .office-id-lbl{color:var(--bmx-hi)}
.mob .office-id-lbl{color:var(--mob-hi)}
.hun .office-id-lbl{color:var(--hun-hi)}
.office-name-lbl{font-weight:300;font-size:.75rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;flex:1}
.office-counts{font-family:var(--mono);font-size:.58rem;color:var(--text-dim);line-height:1.7}
.office-counts .iem-c{color:var(--iem-hi)}
.office-counts .api-c{color:var(--api-hi)}

/* ── WARN LIST ── */
.warn-list{padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;height:100%}
.warn-list::-webkit-scrollbar{width:3px}
.warn-list::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

/* ── COMPARISON BLOCK ── */
.comparison-block{border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--panel)}
.comp-header{padding:6px 10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.phen-badge{font-weight:900;font-size:.65rem;letter-spacing:2px;padding:2px 6px;border-radius:2px}
.phen-badge.TO{background:var(--tor);color:#fff}
.phen-badge.SV{background:var(--svr);color:#fff}
.phen-badge.FF{background:var(--ff);color:#fff}
.phen-badge.FA{background:var(--fa);color:#fff}
.phen-badge.OTHER{background:#333;color:#aaa}
.threat-badge{font-family:var(--mono);font-size:.58rem;letter-spacing:1px;padding:1px 4px;border-radius:2px;border:1px solid}
.threat-badge.CATASTROPHIC{color:#ff2200;border-color:#ff2200;background:rgba(255,34,0,.1)}
.threat-badge.CONSIDERABLE{color:#ff8800;border-color:#ff8800;background:rgba(255,136,0,.1)}
.threat-badge.OBSERVED{color:#ff4444;border-color:#ff4444;background:rgba(255,68,68,.1)}
.threat-badge.STANDARD,.threat-badge.other{display:none}
.pds-badge{font-family:var(--mono);font-size:.55rem;color:#ff0;border:1px solid #880;padding:1px 4px;border-radius:2px;background:rgba(255,255,0,.08);letter-spacing:1px}
.emg-badge{font-family:var(--mono);font-size:.55rem;color:#f00;border:1px solid #f00;padding:1px 4px;border-radius:2px;background:rgba(255,0,0,.1);letter-spacing:1px;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tor-possible{font-family:var(--mono);font-size:.56rem;color:var(--tor-hi);border:1px solid var(--tor);padding:1px 4px;border-radius:2px;background:var(--tor-glow);letter-spacing:1px}
.exp-badge{font-family:var(--mono);font-size:.55rem;color:#666;border:1px solid #444;padding:1px 4px;border-radius:2px;letter-spacing:1px}
.etn-lbl{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);margin-left:auto;white-space:nowrap}
.only-badge{font-family:var(--mono);font-size:.52rem;padding:1px 4px;border-radius:2px;letter-spacing:1px}
.only-badge.iem-only{background:rgba(42,110,42,.3);color:var(--iem-hi);border:1px solid var(--iem)}
.only-badge.api-only{background:rgba(85,85,85,.3);color:var(--api-hi);border:1px solid #666}

/* ── SOURCE TOGGLE (mobile) ── */
.src-toggle{display:flex;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);flex-shrink:0}
.src-btn{flex:1;padding:6px 10px;font-family:var(--mono);font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;transition:all .15s;color:var(--text-dim);border-bottom:2px solid transparent}
.src-btn.iem.active{color:var(--iem-hi);border-bottom-color:var(--iem);background:rgba(42,110,42,.08)}
.src-btn.api.active{color:var(--api-hi);border-bottom-color:var(--api-hi);background:rgba(85,85,85,.08)}

/* ── SOURCE COLUMNS ── */
.source-grid{display:block}
.source-col{padding:8px 10px;border-right:1px solid var(--border)}
.source-col:last-child{border-right:none}
.source-col.api{display:none}
.source-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.source-label{font-family:var(--mono);font-size:.56rem;letter-spacing:2px;text-transform:uppercase}
.source-col.iem .source-label{color:var(--iem-hi)}
.source-col.api .source-label{color:var(--api-hi)}
.source-missing{font-family:var(--mono);font-size:.62rem;color:var(--text-dim);font-style:italic;padding:4px 0}

/* ── DATA ROWS ── */
.data-row{display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.data-lbl{font-family:var(--mono);font-size:.54rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase}
.data-val{font-family:var(--mono);font-size:.7rem;color:var(--text);line-height:1.3}
.data-val.hi{color:var(--text-hi);font-weight:700}
.data-val.warn{color:var(--svr-hi)}
.data-val.danger{color:var(--tor-hi)}
.data-val.dim{color:var(--text-dim)}
.data-val.ff-v{color:var(--ff-hi)}
.diff-flag{font-family:var(--mono);font-size:.52rem;padding:1px 3px;background:rgba(200,150,0,.2);color:#cc0;border:1px solid #660;border-radius:2px;letter-spacing:1px}
.motion-row{display:flex;align-items:center;gap:5px;padding:3px 6px;background:rgba(255,255,255,.02);border-radius:2px;border:1px solid var(--border);margin-top:3px}
.motion-text{font-family:var(--mono);font-size:.68rem;color:var(--text)}
.zone-row{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.zone-tag{font-family:var(--mono);font-size:.54rem;padding:1px 4px;border-radius:2px;background:var(--border);color:var(--text-dim);border:1px solid var(--border-hi)}
.expires-row{display:flex;justify-content:space-between;align-items:center;padding-top:4px;border-top:1px solid var(--border);margin-top:3px}
.exp-lbl{font-family:var(--mono);font-size:.54rem;color:var(--text-dim);letter-spacing:1px}
.exp-val{font-family:var(--mono);font-size:.64rem;color:var(--text-dim)}
.exp-val.soon{color:var(--tor-hi)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);font-family:var(--mono);font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:60px 20px;text-align:center;min-height:200px}
.empty-state .icon{font-size:1.6rem;opacity:.3}
.loading-pulse{animation:loadpulse 1s infinite}
@keyframes loadpulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>

<div id="header">
  <h1>
    <span class="jan">JAN</span><span class="div">/</span>
    <span class="bmx">BMX</span><span class="div">/</span>
    <span class="mob">MOB</span><span class="div">/</span>
    <span class="hun">HUN</span>
    &nbsp;·&nbsp; TOR · SVR · FF
  </h1>
  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="last-updated">—</span>
    <button id="refresh-btn" onclick="fetchData()">↺</button>
  </div>
</div>

<!-- Mobile office tabs -->
<div id="office-tabs">
  <div class="office-tab jan active" onclick="switchOffice('JAN')">
    <span class="tab-id">JAN</span>
    <span class="tab-count" id="tab-count-JAN">—</span>
  </div>
  <div class="office-tab bmx" onclick="switchOffice('BMX')">
    <span class="tab-id">BMX</span>
    <span class="tab-count" id="tab-count-BMX">—</span>
  </div>
  <div class="office-tab mob" onclick="switchOffice('MOB')">
    <span class="tab-id">MOB</span>
    <span class="tab-count" id="tab-count-MOB">—</span>
  </div>
  <div class="office-tab hun" onclick="switchOffice('HUN')">
    <span class="tab-id">HUN</span>
    <span class="tab-count" id="tab-count-HUN">—</span>
  </div>
</div>

<div id="offices">
  <div class="office-panel jan active" id="panel-JAN">
    <div class="office-head">
      <span class="office-id-lbl">JAN</span>
      <span class="office-name-lbl">Jackson, MS</span>
      <div class="office-counts">IEM:<span class="iem-c" id="iem-JAN"> —</span> API:<span class="api-c" id="api-JAN"> —</span></div>
    </div>
    <div class="warn-list" id="list-JAN"><div class="empty-state"><span class="icon loading-pulse">⟳</span><span>Loading...</span></div></div>
  </div>
  <div class="office-panel bmx" id="panel-BMX">
    <div class="office-head">
      <span class="office-id-lbl">BMX</span>
      <span class="office-name-lbl">Birmingham, AL</span>
      <div class="office-counts">IEM:<span class="iem-c" id="iem-BMX"> —</span> API:<span class="api-c" id="api-BMX"> —</span></div>
    </div>
    <div class="warn-list" id="list-BMX"><div class="empty-state"><span class="icon loading-pulse">⟳</span><span>Loading...</span></div></div>
  </div>
  <div class="office-panel mob" id="panel-MOB">
    <div class="office-head">
      <span class="office-id-lbl">MOB</span>
      <span class="office-name-lbl">Mobile, AL</span>
      <div class="office-counts">IEM:<span class="iem-c" id="iem-MOB"> —</span> API:<span class="api-c" id="api-MOB"> —</span></div>
    </div>
    <div class="warn-list" id="list-MOB"><div class="empty-state"><span class="icon loading-pulse">⟳</span><span>Loading...</span></div></div>
  </div>
  <div class="office-panel hun" id="panel-HUN">
    <div class="office-head">
      <span class="office-id-lbl">HUN</span>
      <span class="office-name-lbl">Huntsville, AL</span>
      <div class="office-counts">IEM:<span class="iem-c" id="iem-HUN"> —</span> API:<span class="api-c" id="api-HUN"> —</span></div>
    </div>
    <div class="warn-list" id="list-HUN"><div class="empty-state"><span class="icon loading-pulse">⟳</span><span>Loading...</span></div></div>
  </div>
</div>

<script>
var JSON_URL = "https://glen104.github.io/nwc-status/office_warnings_test.json";
var REFRESH  = 30000;
var activeOffice = "JAN";

var OFFICES = {
  "JAN": {name:"Jackson, MS",       cls:"jan"},
  "BMX": {name:"Birmingham, AL",    cls:"bmx"},
  "MOB": {name:"Mobile, AL",        cls:"mob"},
  "HUN": {name:"Huntsville, AL",    cls:"hun"},
};

// ── OFFICE SWITCHING ──────────────────────────────────────────────────────
function switchOffice(id) {
  activeOffice = id;
  document.querySelectorAll('.office-tab').forEach(function(t){
    var matches = Array.from(t.classList).some(function(c){ return c === id.toLowerCase(); });
    t.classList.toggle('active', matches);
  });
  document.querySelectorAll('.office-panel').forEach(function(p){
    p.classList.toggle('active', p.id === 'panel-' + id);
  });
}

// ── SOURCE TOGGLE ─────────────────────────────────────────────────────────
function switchSrc(blockId, src) {
  var block = document.getElementById(blockId);
  if (!block) return;
  block.querySelectorAll('.source-col').forEach(function(c){
    c.classList.toggle('active', c.classList.contains(src));
    if (c.classList.contains(src)) { c.style.display = 'block'; }
    else { c.style.display = 'none'; }
  });
  block.querySelectorAll('.src-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.src === src);
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('en-US',{
      timeZone:'America/Chicago',month:'numeric',day:'numeric',
      hour:'numeric',minute:'2-digit',hour12:true
    }) + ' CT';
  } catch(e){ return iso; }
}

function expiringSoon(iso) {
  try { return iso && (new Date(iso).getTime() - Date.now()) < 15*60*1000; }
  catch(e){ return false; }
}

function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function diffVal(a, b) {
  if (a == null || b == null) return '';
  if (String(a) !== String(b)) return ' <span class="diff-flag">DIFF</span>';
  return '';
}

function dirArrow(dir) {
  var map={
    'N':0,'NNE':22,'NE':45,'ENE':67,'E':90,'ESE':112,'SE':135,'SSE':157,
    'S':180,'SSW':202,'SW':225,'WSW':247,'W':270,'WNW':292,'NW':315,'NNW':337,
    'NORTH':0,'NORTHEAST':45,'EAST':90,'SOUTHEAST':135,
    'SOUTH':180,'SOUTHWEST':225,'WEST':270,'NORTHWEST':315,'STATIONARY':null
  };
  var d = dir ? dir.toUpperCase().trim() : '';
  var deg = map[d];
  if (deg === null || deg === undefined) return '⊙';
  return '<span style="display:inline-block;transform:rotate('+deg+'deg)">↑</span>';
}

// Get VTEC data — IEM provides it directly in rawProps, API in vtec field
function getVtec(w) {
  if (!w) return null;
  var v = w.vtec || {};
  // If VTEC is missing key fields, try to reconstruct from top-level IEM props
  if (!v.phenomena || !v.etn) {
    return {
      productClass: v.productClass || 'O',
      action:       v.action       || w.action      || '',
      office:       v.office       || w.office      || '',
      phenomena:    v.phenomena    || w.phenomena   || '',
      significance: v.significance || w.significance|| '',
      etn:          v.etn          || w.etn         || '',
      start:        v.start        || '',
      end:          v.end          || '',
    };
  }
  return v;
}

function getPhenLabel(phen) {
  var map = {'TO':'TORNADO','SV':'SEVERE','FF':'FLASH FLOOD','FA':'FLOOD ADVISORY'};
  return map[phen] || phen || 'UNKNOWN';
}

function getThreat(w) {
  if (!w) return 'STANDARD';
  // Use IEM structured tags first
  var rp = w.rawProps || {};
  if (rp.tornadotag === 'CATASTROPHIC' || rp.damagetag === 'CATASTROPHIC') return 'CATASTROPHIC';
  if (rp.tornadotag === 'CONSIDERABLE' || rp.damagetag === 'CONSIDERABLE') return 'CONSIDERABLE';
  if (rp.tornadotag === 'OBSERVED')                                          return 'OBSERVED';
  // Fall back to parsed text-based threat
  return w.threatLevel || 'STANDARD';
}

function getHail(w) {
  if (!w) return null;
  var rp = w.rawProps || {};
  // IEM max_hailtag is in inches as a float
  if (rp.max_hailtag != null && rp.max_hailtag > 0) return rp.max_hailtag + '"';
  if (rp.hailtag)     return rp.hailtag;
  return w.hailSize || null;
}

function getWind(w) {
  if (!w) return null;
  var rp = w.rawProps || {};
  if (rp.max_windtag) return rp.max_windtag + ' MPH';
  if (rp.windtag)     return rp.windtag;
  return w.windSpeed || null;
}

function isPDS(w) {
  if (!w) return false;
  var rp = w.rawProps || {};
  return rp.is_pds || rp.max_is_pds || false;
}

function isEmergency(w) {
  if (!w) return false;
  var rp = w.rawProps || {};
  return rp.is_emergency || rp.max_is_emergency || false;
}

// ── RENDER SOURCE COLUMN ──────────────────────────────────────────────────
function renderSourceCol(w, label, cls, otherW, defaultShow) {
  var html = '<div class="source-col ' + cls + '" style="display:' + (defaultShow?'block':'none') + '">';
  html += '<div class="source-label-row"><span class="source-label">' + label + '</span></div>';

  if (!w) {
    html += '<div class="source-missing">Not in this source</div>';
    html += '</div>';
    return html;
  }

  var phen = (w.phenomena || '').toUpperCase();
  var vtec = getVtec(w);
  var hail = getHail(w);
  var wind = getWind(w);
  var threat = getThreat(w);

  // VTEC details
  if (vtec && (vtec.start || vtec.end)) {
    html += '<div class="data-row"><div class="data-lbl">VTEC</div>';
    html += '<div class="data-val dim" style="font-size:.6rem">';
    if (vtec.start) html += esc(vtec.start);
    if (vtec.start && vtec.end) html += ' → ';
    if (vtec.end) html += esc(vtec.end);
    html += '</div></div>';
  }

  if (w.areaDesc) {
    html += '<div class="data-row"><div class="data-lbl">AREA</div><div class="data-val hi">' + esc(w.areaDesc) + '</div></div>';
  }

  if (hail) {
    html += '<div class="data-row"><div class="data-lbl">HAIL</div><div class="data-val warn">' + esc(hail) + (otherW?diffVal(hail,getHail(otherW)):'') + '</div></div>';
  }
  if (wind) {
    html += '<div class="data-row"><div class="data-lbl">WIND</div><div class="data-val warn">' + esc(wind) + (otherW?diffVal(wind,getWind(otherW)):'') + '</div></div>';
  }
  if (w.detectionSource) {
    html += '<div class="data-row"><div class="data-lbl">DETECTION</div><div class="data-val ' + (w.detectionSource==='OBSERVED'?'danger':'') + '">' + esc(w.detectionSource) + '</div></div>';
  }
  if (w.nearestLocation) {
    html += '<div class="data-row"><div class="data-lbl">LOCATION</div><div class="data-val hi">' + esc(w.nearestLocation) + '</div></div>';
  }
  if (phen === 'FF' && threat && threat !== 'STANDARD') {
    html += '<div class="data-row"><div class="data-lbl">FF THREAT</div><div class="data-val ff-v">' + esc(threat) + '</div></div>';
  }

  if (w.issued) {
    html += '<div class="data-row"><div class="data-lbl">ISSUED</div><div class="data-val dim">' + fmtTime(w.issued) + (otherW?diffVal(w.issued,otherW.issued):'') + '</div></div>';
  }

  if (w.stormMotion) {
    var m = w.stormMotion;
    html += '<div class="motion-row">';
    html += '<span>' + dirArrow(m.direction) + '</span>';
    html += '<span class="motion-text">';
    if (m.direction === 'STATIONARY') { html += 'Stationary'; }
    else {
      html += esc(m.direction) + ' at ' + esc(m.speed_mph) + ' MPH';
      if (m.bearing != null) html += ' <span style="color:var(--text-dim)">(' + m.bearing + '°)</span>';
    }
    html += '</span></div>';
  }

  if (w.nwsHeadline) {
    html += '<div class="data-row" style="margin-top:4px"><div class="data-val dim" style="font-size:.6rem;line-height:1.4">' + esc(w.nwsHeadline) + '</div></div>';
  }

  if (w.ugcZones && w.ugcZones.length) {
    html += '<div class="zone-row">';
    w.ugcZones.forEach(function(z){ html += '<span class="zone-tag">' + esc(z) + '</span>'; });
    html += '</div>';
  }

  if (w.polygon && w.polygon.length) {
    html += '<div class="data-row" style="margin-top:3px"><div class="data-lbl">POLYGON</div><div class="data-val dim">' + w.polygon.length + ' pts</div></div>';
  }

  // IEM VTEC link
  var rp = w.rawProps || {};
  if (rp.href) {
    html += '<div class="data-row" style="margin-top:3px"><a href="' + esc(rp.href) + '" target="_blank" style="font-family:var(--mono);font-size:.6rem;color:var(--iem-hi)">IEM VTEC ↗</a></div>';
  }

  if (w.expires) {
    var soon = expiringSoon(w.expires);
    html += '<div class="expires-row"><span class="exp-lbl">EXPIRES</span><span class="exp-val' + (soon?' soon':'') + '">' + fmtTime(w.expires) + (soon?' ⚠':'') + '</span></div>';
  }

  html += '</div>';
  return html;
}

// ── RENDER COMPARISON BLOCK ───────────────────────────────────────────────
var blockCounter = 0;
function renderComparison(entry) {
  var w     = entry.iem || entry.api;
  if (!w) return '';

  var phen   = (w.phenomena || '').toUpperCase();
  var vtec   = getVtec(w);
  var action = (vtec && vtec.action) || w.action || '';
  var threat = getThreat(w);
  var blockId = 'cb-' + (++blockCounter);
  var isExp  = action === 'EXP' || action === 'CAN';

  var html = '<div class="comparison-block" id="' + blockId + '">';

  // Header
  html += '<div class="comp-header">';

  // Phenomena badge
  var phenLabel = getPhenLabel(phen);
  var phenCls   = ['TO','SV','FF','FA'].indexOf(phen) >= 0 ? phen : 'OTHER';
  html += '<span class="phen-badge ' + phenCls + '">' + phenLabel + '</span>';

  // Threat badge
  if (threat && threat !== 'STANDARD') {
    html += '<span class="threat-badge ' + threat + '">' + threat + '</span>';
  }

  // Special flags from IEM rawProps
  if (isEmergency(w)) html += '<span class="emg-badge">EMERGENCY</span>';
  else if (isPDS(w))  html += '<span class="pds-badge">PDS</span>';

  // Tornado possible (from rawProps tornadotag or parsed text)
  var rp = (w.rawProps || {});
  if (phen !== 'TO' && (rp.tornadotag === 'POSSIBLE' || (w.threatLevel || '').indexOf('POSSIBLE') >= 0)) {
    html += '<span class="tor-possible">TOR POSS</span>';
  }

  // Expired/cancelled
  if (isExp) html += '<span class="exp-badge">' + action + '</span>';

  // Source flags
  if (entry.iemOnly) html += '<span class="only-badge iem-only">IEM ONLY</span>';
  if (entry.apiOnly) html += '<span class="only-badge api-only">API ONLY</span>';

  // ETN
  var etn    = (vtec && vtec.etn) || w.etn || '';
  var office = (vtec && vtec.office) || w.office || '';
  html += '<span class="etn-lbl">' + esc(office) + ' #' + esc(etn) + '</span>';
  html += '</div>';

  // Mobile source toggle
  html += '<div class="src-toggle">';
  html += '<button class="src-btn iem active" data-src="iem" onclick="switchSrc(\'' + blockId + '\',\'iem\')">IEM</button>';
  html += '<button class="src-btn api" data-src="api" onclick="switchSrc(\'' + blockId + '\',\'api\')">api.weather.gov</button>';
  html += '</div>';

  // Source columns
  html += '<div class="source-grid">';
  html += renderSourceCol(entry.iem, 'IEM', 'iem', entry.api, true);
  html += renderSourceCol(entry.api, 'api.weather.gov', 'api', entry.iem, false);
  html += '</div>';

  html += '</div>';
  return html;
}

// ── RENDER OFFICE ─────────────────────────────────────────────────────────
function renderOffice(officeId, officeData) {
  var listEl = document.getElementById('list-' + officeId);
  var iemEl  = document.getElementById('iem-'  + officeId);
  var apiEl  = document.getElementById('api-'  + officeId);
  var tabEl  = document.getElementById('tab-count-' + officeId);
  if (!listEl) return;

  var iemCnt = (officeData && officeData.iemCount != null) ? officeData.iemCount : '—';
  var apiCnt = (officeData && officeData.apiCount != null) ? officeData.apiCount : '—';
  if (iemEl) iemEl.textContent = ' ' + iemCnt;
  if (apiEl) apiEl.textContent = ' ' + apiCnt;
  if (tabEl) tabEl.textContent = 'I:' + iemCnt + ' A:' + apiCnt;

  blockCounter = 0;
  var comparison = (officeData && officeData.comparison) || [];

  if (!comparison.length) {
    listEl.innerHTML = '<div class="empty-state"><span class="icon">✓</span><span>No active warnings</span></div>';
    return;
  }

  listEl.innerHTML = comparison.map(renderComparison).join('');
}

// ── FETCH ─────────────────────────────────────────────────────────────────
function fetchData() {
  var dot = document.getElementById('dot');
  dot.style.background = '#a84';
  fetch(JSON_URL + '?cb=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      dot.style.background = '#2a6';
      var offices = data.offices || {};
      Object.keys(offices).forEach(function(id){ renderOffice(id, offices[id]); });
      document.getElementById('last-updated').textContent = fmtTime(data.updated);
    })
    .catch(function(e){
      dot.style.background = '#a33';
      document.getElementById('last-updated').textContent = 'Error';
      console.error(e);
    });
}

fetchData();
setInterval(fetchData, REFRESH);
</script>
